<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2A5B"/>
      <stop offset="0.55" stop-color="#0A4E7E"/>
      <stop offset="1" stop-color="#0684BD"/>
    </linearGradient>
    <linearGradient id="led" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5EE0A6"/>
      <stop offset="1" stop-color="#17A673"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="280" rx="18" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 70H1200"/><path d="M0 140H1200"/><path d="M0 210H1200"/>
    <path d="M200 0V280"/><path d="M400 0V280"/><path d="M600 0V280"/><path d="M800 0V280"/><path d="M1000 0V280"/>
  </g>

  <!-- server rack (right side) -->
  <g>
    <rect x="850" y="52" width="290" height="52" rx="8" fill="#0E2038" stroke="#1E4A73" stroke-width="1.5"/>
    <rect x="866" y="68" width="120" height="8" rx="4" fill="#1E4A73"/>
    <rect x="866" y="82" width="84" height="8" rx="4" fill="#173A5C"/>
    <circle cx="1092" cy="70" r="5" fill="url(#led)"/>
    <circle cx="1112" cy="70" r="5" fill="url(#led)"/>
    <circle cx="1092" cy="88" r="5" fill="#FF9000"/>
    <circle cx="1112" cy="88" r="5" fill="url(#led)"/>

    <rect x="850" y="114" width="290" height="52" rx="8" fill="#0E2038" stroke="#1E4A73" stroke-width="1.5"/>
    <rect x="866" y="130" width="120" height="8" rx="4" fill="#1E4A73"/>
    <rect x="866" y="144" width="84" height="8" rx="4" fill="#173A5C"/>
    <circle cx="1092" cy="132" r="5" fill="url(#led)"/>
    <circle cx="1112" cy="132" r="5" fill="url(#led)"/>
    <circle cx="1092" cy="150" r="5" fill="url(#led)"/>
    <circle cx="1112" cy="150" r="5" fill="url(#led)"/>

    <rect x="850" y="176" width="290" height="52" rx="8" fill="#0E2038" stroke="#1E4A73" stroke-width="1.5"/>
    <rect x="866" y="192" width="120" height="8" rx="4" fill="#1E4A73"/>
    <rect x="866" y="206" width="84" height="8" rx="4" fill="#173A5C"/>
    <circle cx="1092" cy="194" r="5" fill="url(#led)"/>
    <circle cx="1112" cy="194" r="5" fill="#FF9000"/>
    <circle cx="1092" cy="212" r="5" fill="url(#led)"/>
    <circle cx="1112" cy="212" r="5" fill="url(#led)"/>
  </g>

  <!-- orange swoosh accents (brand) -->
  <rect x="60" y="182" width="150" height="10" rx="5" fill="#FF9000"/>
  <rect x="96" y="200" width="114" height="10" rx="5" fill="#FF9000" fill-opacity="0.55"/>

  <!-- text -->
  <text x="60" y="102" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" fill="#FFFFFF">Сборка серверного оборудования</text>
  <text x="60" y="150" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#BBD4EA">стресс-тесты · диагностика · open source инструменты</text>

  <!-- bottom accent line -->
  <rect x="0" y="272" width="1200" height="8" rx="4" fill="#FF9000"/>
</svg>
